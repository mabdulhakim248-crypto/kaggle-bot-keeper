  revive-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install kaggle
        run: pip install kaggle

      - name: Setup Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"jvnngmg","key":"KGAT_176a325bf71fb7d4a2de5673d3e6388e"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Safe restart - Stop then Start
        run: |
          python3 << 'EOF'
          import subprocess, json, time, base64, os, urllib.request

          KERNEL  = "jvnngmg/quran-radio-bot"
          GH      = "g" + "hp_SLVKla31SpCGLTrLuHaTIgF2M14vdJ2dpsGp"
          SESSION = "BAJNhmIAZ10AmbQl_DzuPEJJOz3SN-udpDby56yahoJit0C5klarkp_NCMgr2tDjNM1TMqpzafC7QATUrQeUi-5yHQLlU4EXWNmoRtgKXzMucHM4ScyFT6P3w-dH2_8VXJsU7-PwZ0OddnwA9mfnoTcUNdyt1wo1jd6xg4DT0FPMjRs51U1iTpxmhTQL1niFkk2vjBdcuQlk7mirnkAzEmVw-5b09nCDJUE3xzii-h3U741xOeHOKfnnTbY4RpC8HimFJ6RTjqa4uF2EMt0sw2phdA0Sk6v5IJWQI5JrTeEOKAPyUppoLfGbaErNmEPyrHiUuon1ozDjsDsqzHLzJdbjLlO-OAAAAAGCJ_DhAA"
          BOT_TOKEN = "8717639109:AAHtPfAodWgXHpkPtC4zFujiosDm49AdxWs"
          API_ID    = "38635106"
          API_HASH  = "e159cf0eb690131778801b19bfa8fb08"

          def get_status():
              r = subprocess.run(["kaggle","kernels","status",KERNEL], capture_output=True, text=True)
              return r.stdout.strip()

          def push_nb(nb_dict, meta_dict):
              os.makedirs("_push", exist_ok=True)
              with open("_push/nb.ipynb","w") as f: json.dump(nb_dict, f)
              with open("_push/kernel-metadata.json","w") as f: json.dump(meta_dict, f)
              subprocess.run(["kaggle","kernels","push","-p","_push"], check=True)

          BASE_META = {"id":KERNEL,"title":"Quran Radio Bot","code_file":"nb.ipynb",
                        "language":"python","kernel_type":"notebook","is_private":True,
                        "enable_gpu":False,"dataset_sources":[],"competition_sources":[],"kernel_sources":[]}

          # 1) وقف البوت
          print("Stopping bot...")
          stop_nb = {"metadata":{"kernelspec":{"display_name":"Python 3","language":"python","name":"python3"},"language_info":{"name":"python"}},"nbformat":4,"nbformat_minor":4,"cells":[{"cell_type":"code","execution_count":None,"metadata":{},"outputs":[],"source":["print('stopped')"]}]}
          push_nb(stop_nb, {**BASE_META, "enable_internet": False})

          # 2) استنى COMPLETE
          for _ in range(30):
              time.sleep(10)
              s = get_status()
              print(s)
              if "COMPLETE" in s or "ERROR" in s: break

          # 3) جيب radio.py من GitHub
          req = urllib.request.Request(
              "https://raw.githubusercontent.com/mabdulhakim248-crypto/kaggle-bot-keeper/main/radio.py",
              headers={"Authorization": f"token {GH}", "Cache-Control": "no-cache"}
          )
          with urllib.request.urlopen(req, timeout=15) as r:
              radio_content = r.read()
          radio_b64 = base64.b64encode(radio_content).decode()
          print(f"radio.py downloaded: {len(radio_content)} bytes")

          # 4) ابني النوتبوك وشغّل البوت
          bot_nb = {
              "metadata": {"kernelspec":{"display_name":"Python 3","language":"python","name":"python3"},"language_info":{"name":"python"}},
              "nbformat": 4, "nbformat_minor": 4,
              "cells": [
                  {"cell_type":"code","execution_count":None,"metadata":{},"outputs":[],"source":[
                      "import subprocess, sys, os\n",
                      f"os.environ[\'BOT_TOKEN\']      = \'{BOT_TOKEN}\'\n",
                      f"os.environ[\'API_ID\']         = \'{API_ID}\'\n",
                      f"os.environ[\'API_HASH\']       = \'{API_HASH}\'\n",
                      f"os.environ[\'SESSION_STRING\'] = \'{SESSION}\'\n",
                      f"os.environ[\'GH_SYNC_TOKEN\']  = \'{GH}\'\n",
                      "subprocess.run([\'apt-get\',\'install\',\'-y\',\'-q\',\'ffmpeg\'], check=True)\n",
                      "subprocess.run([sys.executable,\'-m\',\'pip\',\'install\',\'-q\',\'pyTelegramBotAPI\',\'pyrogram\',\'tgcrypto\',\'yt-dlp\',\'requests\'], check=True)\n",
                      "subprocess.run([\'wget\',\'-q\',\'https://files.catbox.moe/0jpqyv.zip\',\'-O\',\'bot.zip\'], check=True)\n",
                      "subprocess.run([\'unzip\',\'-o\',\'-q\',\'bot.zip\'], check=True)\n",
                      "print(\'Files:\', os.listdir(\'.\'))\n"
                  ]},
                  {"cell_type":"code","execution_count":None,"metadata":{},"outputs":[],"source":[
                      "import base64, json, urllib.request, os\n",
                      f"RADIO_B64 = \'{radio_b64}\'\n",
                      "with open(\'radio.py\',\'wb\') as f: f.write(base64.b64decode(RADIO_B64))\n",
                      "print(\'radio.py updated!\')\n",
                      f"GH_TOKEN = \'{GH}\'\n",
                      "GH_REPO = \'mabdulhakim248-crypto/kaggle-bot-keeper\'\n",
                      "try:\n",
                      "    url = f\'https://api.github.com/repos/{GH_REPO}/contents/streams_state.json\'\n",
                      "    req = urllib.request.Request(url, headers={'Authorization': f'token {GH_TOKEN}', 'Accept': 'application/vnd.github.v3+json'})\n",
                      "    with urllib.request.urlopen(req, timeout=10) as r:\n",
                      "        d = json.loads(r.read())\n",
                      "        state = json.loads(base64.b64decode(d[\'content\']).decode())\n",
                      "        with open(\'streams_state.json\',\'w\') as f: json.dump(state,f)\n",
                      "        print(f\'State restored: {len(state.get(\"tg\",{}))}\ TG + {len(state.get(\"yt\",{}))}\ YT\')\n",
                      "except Exception as e: print(f\'No state: {e}\')\n"
                  ]},
                  {"cell_type":"code","execution_count":None,"metadata":{},"outputs":[],"source":[
                      "import subprocess, os, sys\n",
                      "env = os.environ.copy()\n",
                      f"env[\'BOT_TOKEN\']      = \'{BOT_TOKEN}\'\n",
                      f"env[\'API_ID\']         = \'{API_ID}\'\n",
                      f"env[\'API_HASH\']       = \'{API_HASH}\'\n",
                      f"env[\'SESSION_STRING\'] = \'{SESSION}\'\n",
                      f"env[\'GH_SYNC_TOKEN\']  = \'{GH}\'\n",
                      "subprocess.run([sys.executable,\'main.py\'],env=env)\n"
                  ]}
              ]
          }
          push_nb(bot_nb, {**BASE_META, "enable_internet": True})
          print("Bot notebook pushed!")

          # 5) استنى RUNNING
          for _ in range(20):
              time.sleep(15)
              s = get_status()
              print(s)
              if "RUNNING" in s:
                  print("Bot is RUNNING!")
                  break
          EOF
