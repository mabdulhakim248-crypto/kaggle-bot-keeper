name: Revive Kaggle Bot

on:
  schedule:
    - cron: '0 */11 * * *'
  workflow_dispatch:

jobs:
  revive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Kaggle CLI
        run: pip install -q kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"jvnngmg","key":"'"$KAGGLE_API_TOKEN"'"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Check bot status
        id: status
        run: |
          STATUS=$(kaggle kernels status jvnngmg/quran-radio-bot 2>&1)
          echo "status=$STATUS"
          if echo "$STATUS" | grep -qi "RUNNING"; then
            echo "running=true" >> $GITHUB_OUTPUT
          else
            echo "running=false" >> $GITHUB_OUTPUT
          fi

      - name: Revive bot if not running
        if: steps.status.outputs.running == 'false'
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        run: python3 revive_push.py
