name: Revive Kaggle Bot

on:
  schedule:
    - cron: '0 */11 * * *'
  workflow_dispatch:

jobs:
  revive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Kaggle CLI
        run: pip install -q kaggle

      - name: Check and revive bot
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python3 - <<'EOF'
          import subprocess, sys, os, json, time, base64

          token = os.environ["KAGGLE_API_TOKEN"]
          os.makedirs(os.path.expanduser("~/.kaggle"), exist_ok=True)
          with open(os.path.expanduser("~/.kaggle/kaggle.json"), "w") as f:
              json.dump({"username": "jvnngmg", "key": token}, f)
          os.chmod(os.path.expanduser("~/.kaggle/kaggle.json"), 0o600)

          def status():
              r = subprocess.run(
                  ["kaggle", "kernels", "status", "jvnngmg/quran-radio-bot"],
                  capture_output=True, text=True
              )
              return r.stdout + r.stderr

          def push_notebook(nb, meta):
              import tempfile
              d = tempfile.mkdtemp()
              with open(f"{d}/nb.ipynb", "w") as f:
                  json.dump(nb, f)
              with open(f"{d}/kernel-metadata.json", "w") as f:
                  json.dump(meta, f)
              r = subprocess.run(
                  ["kaggle", "kernels", "push"],
                  cwd=d, capture_output=True, text=True
              )
              print(r.stdout, r.stderr)

          META = {
              "id": "jvnngmg/quran-radio-bot",
              "title": "Quran Radio Bot",
              "code_file": "nb.ipynb",
              "language": "python",
              "kernel_type": "notebook",
              "is_private": True,
              "enable_gpu": False,
              "enable_internet": True,
              "dataset_sources": [],
              "competition_sources": [],
              "kernel_sources": []
          }

          s = status()
          print("Current status:", s)

          if "RUNNING" in s.upper():
              print("Bot is already running. Nothing to do.")
              sys.exit(0)

          print("Bot is not running. Reviving...")

          with open("kaggle_notebook.ipynb") as f:
              nb = json.load(f)

          for fname in ["main.py", "radio.py", "youtube.py"]:
              if not os.path.exists(fname):
                  continue
              with open(fname, "rb") as f:
                  b64 = base64.b64encode(f.read()).decode()
              key = fname.replace(".py", "").upper() + "_B64"
              for cell in nb["cells"]:
                  src = "".join(cell["source"])
                  if key in src:
                      lines = src.split("\n")
                      cell["source"] = ["\n".join(
                          f"{key} = '{b64}'" if l.startswith(f"{key} = '") else l
                          for l in lines
                      )]
                      break

          push_notebook(nb, META)

          print("Waiting for RUNNING...")
          for i in range(20):
              time.sleep(30)
              s = status()
              print(f"[{i+1}]", s.strip())
              if "RUNNING" in s.upper():
                  print("Bot revived successfully!")
                  break
          EOF
